# Fly.io deploy. Secrets are set out-of-band: `fly secrets set ANTHROPIC_API_KEY=... VOYAGE_API_KEY=...`
app = "engineering-intelligence-hub"
primary_region = "iad"

[build]
  dockerfile = "infra/backend.Dockerfile"

[env]
  CORS_ALLOW_ORIGINS = "https://your-frontend.vercel.app"
  AUTH_ENABLED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
