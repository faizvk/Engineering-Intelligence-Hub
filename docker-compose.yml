# Local dev + single-box demo: the FastAPI backend wired to a pgvector-enabled
# Postgres, gated on the DB healthcheck. `docker compose up -d --build`.
services:
  db:
    image: pgvector/pgvector:pg17     # Postgres 17 + pgvector preinstalled
    container_name: eih-db
    environment:
      POSTGRES_USER: eih
      POSTGRES_PASSWORD: eih
      POSTGRES_DB: eih
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # *.sql here runs once, in filename order, on an empty data dir:
      - ./infra/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eih -d eih"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    container_name: eih-backend
    env_file: .env
    environment:
      # Inside the compose network the DB host is the service name, not localhost.
      DATABASE_URL: postgresql+psycopg://eih:eih@db:5432/eih
      DATABASE_URL_RAW: postgresql://eih:eih@db:5432/eih
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy  # wait for the healthcheck, not just start

volumes:
  pgdata:
